<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧭</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --fg: #d4d0c8;
      --dim: #4a4845;
      --accent: #c8b89a;
      --accent-glow: rgba(200, 184, 154, 0.15);
      --border: #1e1e1e;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Courier New', Courier, monospace;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Grain overlay ── */
    #grain {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.045;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 128px 128px;
      animation: grain 0.8s steps(2) infinite;
    }

    @keyframes grain {
      0%   { transform: translate(0, 0); }
      25%  { transform: translate(-2px, 1px); }
      50%  { transform: translate(1px, -2px); }
      75%  { transform: translate(2px, 1px); }
      100% { transform: translate(-1px, 2px); }
    }

    /* ── Scanlines ── */
    #scanlines {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,0.06) 2px,
        rgba(0,0,0,0.06) 4px
      );
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      position: relative;
      z-index: 10;
    }

    /* ── Center block ── */
    .center-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3.5rem;
      width: 100%;
      max-width: 480px;
    }

    /* ── Staggered fade-in ── */
    .fade-in {
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
    }

    .fade-in:nth-child(1) { animation-delay: 0.1s; }
    .fade-in:nth-child(2) { animation-delay: 0.35s; }
    .fade-in:nth-child(3) { animation-delay: 0.55s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Play button ── */
    .play-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.2rem;
      position: relative;
      border-radius: 50%;
      transition: opacity 0.2s;
    }

    .play-btn:hover { opacity: 0.6; }

    .play-btn svg {
      width: 18px;
      height: 18px;
      fill: var(--fg);
      transition: fill 0.2s;
      position: relative;
      z-index: 1;
    }

    .play-btn:hover svg { fill: var(--accent); }

    audio { display: none; }

    /* ── Footer nav ── */
    .inline-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      width: 100%;
    }

    .inline-footer a, .signal-trigger, .proprietor-trigger {
      color: var(--dim);
      text-decoration: none;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: lowercase;
      transition: color 0.2s, text-shadow 0.2s;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Courier New', Courier, monospace;
      padding: 0;
      white-space: nowrap;
    }

    .inline-footer a:hover,
    .signal-trigger:hover,
    .proprietor-trigger:hover {
      color: var(--accent);
      text-shadow: 0 0 12px rgba(200,184,154,0.4);
    }

    .est {
      text-align: center;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      color: #2a2826;
      font-family: 'Courier New', Courier, monospace;
      text-transform: lowercase;
      margin-top: -2rem;
    }

    /* ── Overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(10,10,10,0.94);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 100;
      backdrop-filter: blur(4px);
    }

    .overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .overlay::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      transition: opacity 0.4s 0.15s;
    }

    .overlay.open::before { opacity: 0.4; }

    .signal-form {
      width: 100%;
      max-width: 380px;
      padding: 0 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      transform: translateY(12px);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .overlay.open .signal-form {
      transform: translateY(0);
    }

    .signal-row {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      border-bottom: 1px solid var(--border);
      transition: border-color 0.2s;
    }

    .signal-row:focus-within {
      border-color: rgba(200,184,154,0.3);
    }

    .signal-row--msg {
      align-items: flex-start;
    }

    .signal-label {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: var(--dim);
      text-transform: lowercase;
      font-family: 'Courier New', Courier, monospace;
      white-space: nowrap;
      width: 2.5rem;
      flex-shrink: 0;
      padding: 0.5rem 0;
      transition: color 0.2s;
    }

    .signal-row:focus-within .signal-label {
      color: var(--accent);
    }

    .signal-form input,
    .signal-form textarea {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--fg);
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      padding: 0.5rem 0;
      outline: none;
      width: 100%;
      caret-color: var(--accent);
    }

    .signal-form textarea {
      resize: none;
      height: 80px;
      line-height: 1.6;
    }

    .signal-form input::placeholder,
    .signal-form textarea::placeholder {
      color: var(--dim);
      opacity: 0.3;
    }

    .form-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.4rem;
    }

    .close-btn {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: var(--dim);
      background: none;
      border: none;
      cursor: pointer;
      transition: color 0.2s;
      padding: 0;
      text-transform: lowercase;
    }

    .close-btn:hover { color: var(--fg); }

    .send-btn {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: var(--fg);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      text-transform: lowercase;
      transition: color 0.2s, text-shadow 0.2s;
    }

    .send-btn:hover {
      color: var(--accent);
      text-shadow: 0 0 12px rgba(200,184,154,0.5);
    }

    .send-btn:disabled { opacity: 0.3; cursor: default; }

    .status-msg {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: var(--dim);
      text-align: center;
      min-height: 1rem;
    }

    .status-msg.ok { color: var(--accent); }
    .status-msg.err { color: #a06060; }

    .form-disclaimer {
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      color: #2e2c2a;
      text-align: center;
      line-height: 1.6;
      margin-top: 0.5rem;
    }

    /* ── Transmit animation ── */
    @keyframes transmitting {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .transmitting { animation: transmitting 0.6s ease infinite; }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      main { padding: 1.5rem 1rem; }
      .center-block { gap: 2.5rem; }
      .inline-footer { gap: 1rem 1.4rem; max-width: 280px; }
      .inline-footer a, .signal-trigger, .proprietor-trigger {
        font-size: 0.65rem;
        color: var(--fg);
      }
      .signal-form { padding: 0 1rem; }
      .signal-form input, .signal-form textarea { font-size: 16px; letter-spacing: 0.08em; }
      .signal-label { font-size: 16px; }
      .est {
        margin-top: -1.5rem;
        color: var(--dim);
      }
    }

    @media (max-width: 360px) {
      .inline-footer { max-width: 240px; gap: 0.8rem 1rem; }
    }
  </style>
</head>
<body>

  <div id="grain"></div>
  <div id="scanlines"></div>

  <main>
    <div class="center-block">
      <button class="play-btn fade-in" id="playBtn" aria-label="Play">
        <svg viewBox="0 0 16 16" id="playIcon"><polygon points="3,1 14,8 3,15"/></svg>
      </button>
      <audio id="audio" src="audio.mp3"></audio>
      <nav class="inline-footer fade-in">
        <a href="https://www.threads.com/@jeremedotxyz" target="_blank" rel="noopener">field notes</a>
        <a href="https://www.instagram.com/jeremedotxyz/" target="_blank" rel="noopener">exposures</a>
        <button class="proprietor-trigger" id="proprietorTrigger">proprietor</button>
        <a href="https://github.com/jeremedotxyz" target="_blank" rel="noopener">artifacts</a>
        <a href="latlong.html">lat/long</a>
        <button class="signal-trigger" id="signalTrigger">signal</button>
      </nav>
      <p class="est fade-in">est. 2021</p>
    </div>
  </main>

  <div class="overlay" id="overlay">
    <div class="signal-form">
      <div class="signal-row">
        <label class="signal-label" for="sigName">name</label>
        <input type="text" id="sigName" autocomplete="off" />
      </div>
      <div class="signal-row">
        <label class="signal-label" for="sigEmail">email</label>
        <input type="email" id="sigEmail" autocomplete="off" />
      </div>
      <div class="signal-row signal-row--msg">
        <label class="signal-label" for="sigMsg">msg</label>
        <textarea id="sigMsg"></textarea>
      </div>
      <div class="form-actions">
        <button class="close-btn" id="closeBtn">cancel</button>
        <button class="send-btn" id="sendBtn">transmit</button>
      </div>
      <p class="status-msg" id="statusMsg"></p>
      <p class="form-disclaimer">every signal is ingested, interpreted, and answered by an always-on intelligence</p>
    </div>
  </div>

  <script>
    /* ── Audio ── */
    const audio    = document.getElementById('audio');
    const playBtn  = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');

    const pauseSVG = `<rect x="3" y="2" width="4" height="12"/><rect x="9" y="2" width="4" height="12"/>`;
    const playSVG  = `<polygon points="3,1 14,8 3,15"/>`;

    playBtn.addEventListener('click', () => {
      if (audio.paused) {
        audio.play().catch(e => console.error('play error:', e));
        playIcon.innerHTML = pauseSVG;
        playBtn.classList.add('playing');
      } else {
        audio.pause();
        playIcon.innerHTML = playSVG;
        playBtn.classList.remove('playing');
      }
    });

    audio.addEventListener('ended', () => {
      playIcon.innerHTML = playSVG;
      playBtn.classList.remove('playing');
    });

    /* ── Nav ── */
    document.getElementById('proprietorTrigger').addEventListener('click', () => {
      window.location.href = 'proprietor.html';
    });

    /* ── Signal overlay ── */
    const overlay    = document.getElementById('overlay');
    const sendBtn    = document.getElementById('sendBtn');
    const statusMsg  = document.getElementById('statusMsg');

    document.getElementById('signalTrigger').addEventListener('click', () => overlay.classList.add('open'));
    document.getElementById('closeBtn').addEventListener('click', closeOverlay);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeOverlay(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeOverlay(); });

    function closeOverlay() {
      overlay.classList.remove('open');
      statusMsg.textContent = '';
      statusMsg.className = 'status-msg';
    }

    sendBtn.addEventListener('click', async () => {
      const name  = document.getElementById('sigName').value.trim();
      const email = document.getElementById('sigEmail').value.trim();
      const msg   = document.getElementById('sigMsg').value.trim();

      if (!name || !email || !msg) {
        statusMsg.textContent = 'all fields required.';
        statusMsg.className = 'status-msg err';
        return;
      }

      sendBtn.disabled = true;
      statusMsg.textContent = 'transmitting...';
      statusMsg.className = 'status-msg transmitting';

      const WEBHOOK = 'https://jereme-signal.jeremedotxyz.workers.dev';

      try {
        await fetch(WEBHOOK, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            text: `📡 *signal received*\n*name:* ${name}\n*email:* ${email}\n*message:* ${msg}`
          })
        });
        statusMsg.textContent = 'signal sent.';
        statusMsg.className = 'status-msg ok';
        document.getElementById('sigName').value  = '';
        document.getElementById('sigEmail').value = '';
        document.getElementById('sigMsg').value   = '';
        setTimeout(() => closeOverlay(), 2000);
      } catch {
        statusMsg.textContent = 'transmission failed. try again.';
        statusMsg.className = 'status-msg err';
      }

      sendBtn.disabled = false;
    });
  </script>

</body>
</html>
