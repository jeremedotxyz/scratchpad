<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — jereme.xyz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f0;
      --fg: #111110;
      --dim: #888882;
      --border: #d4d4cc;
      --amber: #b84010;
      --scanline: rgba(0,0,0,0.012);
      --px: 'Share Tech Mono', 'Courier New', monospace;
      --pad: clamp(1.25rem, 5vw, 3rem);
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      overflow: hidden;
    }

    /* CRT effects */
    #crt-vignette {
      position: fixed; inset: 0; z-index: 3; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.1) 100%);
    }
    #scanlines {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
      background: repeating-linear-gradient(
        to bottom, transparent 0px, transparent 3px,
        var(--scanline) 3px, var(--scanline) 4px
      );
    }
    #grain {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      opacity: 0.05;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
      animation: grain 0.8s steps(2) infinite;
    }
    @keyframes grain {
      0%   { transform: translate(0,0); }
      25%  { transform: translate(-2px,1px); }
      50%  { transform: translate(1px,-2px); }
      75%  { transform: translate(2px,1px); }
      100% { transform: translate(-1px,2px); }
    }
    @keyframes flicker {
      0%,94%,100% { opacity: 1; }
      95% { opacity: 0.97; }
      97% { opacity: 0.99; }
    }
    body { animation: flicker 10s infinite; }

    /* MAIN */
    .container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: var(--pad);
      max-width: 600px;
      width: 100%;
    }

    .error-code {
      font-size: clamp(5rem, 20vw, 10rem);
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--fg);
      opacity: 0;
      animation: fadeUp 0.7s ease 0.1s forwards;
    }

    .error-code span { color: var(--amber); }

    .error-label {
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--amber);
      margin-top: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.3s forwards;
    }
    .error-label::before { content: '// '; opacity: 0.6; }

    .error-message {
      font-size: clamp(0.7rem, 2.5vw, 0.85rem);
      letter-spacing: 0.08em;
      color: var(--dim);
      margin-top: 1.2rem;
      line-height: 2;
      max-width: 420px;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.5s forwards;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin: 2rem 0;
      opacity: 0;
      animation: fadeIn 0.7s ease 0.7s forwards;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.9s forwards;
    }

    .nav-links a {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: lowercase;
      color: var(--dim);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--amber); }
    .nav-links a.primary { color: var(--amber); }
    .nav-links a.primary:hover { opacity: 0.7; }

    /* blinking cursor after 404 */
    .cursor {
      display: inline-block;
      width: 0.08em;
      height: 0.85em;
      background: var(--amber);
      margin-left: 0.15em;
      vertical-align: bottom;
      opacity: 0;
      animation: cursorAppear 0s 1.2s forwards, blink 1.1s step-end 1.2s infinite;
    }
    @keyframes cursorAppear {
      to { opacity: 1; }
    }
    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* lost signal line */
    .signal-line {
      font-size: 0.5rem;
      letter-spacing: 0.25em;
      color: var(--border);
      margin-top: 0.75rem;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.4s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>

  <div id="grain"></div>
  <div id="scanlines"></div>
  <div id="crt-vignette"></div>

  <div class="container">
    <div class="error-code">4<span>0</span>4<span class="cursor"></span></div>
    <div class="error-label">signal lost</div>
    <div class="signal-line">jereme.xyz · transmission interrupted</div>
    <p class="error-message">
      this page doesn't exist.<br>
      maybe it never did.<br>
      maybe it did and someone deleted it.<br>
      either way, it's gone now.
    </p>
    <div class="divider"></div>
    <div class="nav-links">
      <a href="/" class="primary">← back to base</a>
      <a href="/pct.html">pct 2027</a>
    </div>
  </div>

</body>
</html>
