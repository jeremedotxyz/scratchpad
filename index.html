<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jereme henderson</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f0;
      --bg2: #eeeee8;
      --fg: #111110;
      --dim: #888882;
      --accent: #111110;
      --accent-2: #444440;
      --border: #d4d4cc;
      --amber: #b84010;
      --scanline: rgba(0,0,0,0.012);
      --px: 'Share Tech Mono', 'Courier New', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--px);
      overflow-x: hidden;
      min-height: 100vh;
    }

    #crt-vignette {
      position: fixed; inset: 0; z-index: 3; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.1) 100%);
    }
    #phosphor {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: radial-gradient(ellipse at 50% 40%, rgba(200,200,180,0.05) 0%, transparent 70%);
    }
    #scanlines {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
      background: repeating-linear-gradient(
        to bottom, transparent 0px, transparent 3px,
        var(--scanline) 3px, var(--scanline) 4px
      );
    }
    #grain {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      opacity: 0.05;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
      animation: grain 0.8s steps(2) infinite;
    }
    @keyframes grain {
      0%   { transform: translate(0,0); }
      25%  { transform: translate(-2px,1px); }
      50%  { transform: translate(1px,-2px); }
      75%  { transform: translate(2px,1px); }
      100% { transform: translate(-1px,2px); }
    }
    @keyframes flicker {
      0%,94%,100% { opacity: 1; }
      95% { opacity: 0.97; }
      97% { opacity: 0.99; }
    }
    body { animation: flicker 10s infinite; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.4rem 3rem;
      border-bottom: 1px solid transparent;
      transition: border-color 0.4s, background 0.4s;
    }
    nav.scrolled {
      border-color: var(--border);
      background: rgba(245,245,240,0.95);
    }
    .nav-logo {
      font-size: 0.68rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--dim); text-decoration: none; transition: color 0.2s;
    }
    .nav-logo:hover { color: var(--amber); }
    .nav-right {
      font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--border);
    }

    #hero {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
      padding: 0 3rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .hero-main {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-top: 6rem;
    }

    .hero-eyebrow {
      font-size: 0.58rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--border);
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.2s forwards;
    }

    .hero-name {
      font-size: clamp(3.5rem, 10vw, 7rem);
      letter-spacing: -0.01em;
      line-height: 0.92;
      color: var(--fg);
      display: flex;
      align-items: baseline;
      white-space: nowrap;
    }

    .hero-name .amber { color: var(--amber); }

    /* each letter */
    .letter {
      display: inline-block;
      opacity: 0;
      animation: somersaultIn 0.75s cubic-bezier(0.22, 1.2, 0.36, 1) forwards;
    }

    /* dot gets extra drama */
    .letter-dot {
      animation: somersaultInDot 0.95s cubic-bezier(0.22, 1.35, 0.36, 1) forwards;
    }

    @keyframes somersaultIn {
      0%   { opacity: 0; transform: translateX(-160px) rotate(-360deg); }
      60%  { opacity: 1; transform: translateX(6px) rotate(10deg); }
      78%  { transform: translateX(-3px) rotate(-4deg); }
      100% { opacity: 1; transform: translateX(0) rotate(0deg); }
    }

    @keyframes somersaultInDot {
      0%   { opacity: 0; transform: translateX(-200px) rotate(-720deg) scale(1.5); }
      55%  { opacity: 1; transform: translateX(12px) rotate(20deg) scale(1.15); }
      72%  { transform: translateX(-6px) rotate(-8deg) scale(0.92); }
      88%  { transform: translateX(3px) rotate(3deg) scale(1.04); }
      100% { opacity: 1; transform: translateX(0) rotate(0deg) scale(1); }
    }

    .hero-tagline {
      margin-top: 2.5rem;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dim);
      max-width: 380px;
      line-height: 2.2;
      opacity: 0;
    }

    .hero-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-bottom: 2.5rem;
      opacity: 0;
    }

    .hero-location {
      font-size: 0.55rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--border);
    }
    .hero-location::before { content: '↓ '; color: var(--amber); }

    #ventures {
      position: relative; z-index: 10;
      padding: 10rem 3rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .ventures-label {
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--border);
    }
    .ventures-label::before { content: '// '; color: var(--amber); opacity: 0.6; }

    .venture-list { list-style: none; }

    .venture-item {
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: 3rem 1fr auto;
      align-items: center;
      gap: 2rem;
      padding: 1.6rem 0;
      cursor: default;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.5s ease, transform 0.5s ease, background 0.2s;
    }
    .venture-item.visible { opacity: 1; transform: translateY(0); }
    .venture-item:last-child { border-bottom: 1px solid var(--border); }

    .venture-num { font-size: 0.5rem; letter-spacing: 0.15em; color: var(--border); align-self: center; }
    .venture-name {
      font-size: clamp(1.4rem, 4vw, 2.6rem);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--fg);
      transition: color 0.2s;
    }
    .venture-item:hover .venture-name { color: var(--amber); }
    .venture-role {
      font-size: 0.55rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--border); text-align: right; transition: color 0.2s;
    }
    .venture-item:hover .venture-role { color: var(--dim); }

    #contact {
      position: relative; z-index: 10;
      padding: 10rem 3rem 8rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .contact-label {
      font-size: 0.55rem; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--border); margin-bottom: 4rem;
      opacity: 0; transform: translateY(10px);
      transition: opacity 0.6s, transform 0.6s;
    }
    .contact-label.visible { opacity: 1; transform: translateY(0); }
    .contact-label::before { content: '// '; color: var(--amber); opacity: 0.6; }

    .contact-line {
      opacity: 0; transform: translateY(12px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .contact-line.visible { opacity: 1; transform: translateY(0); }

    .contact-big {
      font-size: clamp(1rem, 3vw, 1.8rem);
      letter-spacing: 0.06em; color: var(--dim);
      line-height: 1.9; max-width: 600px; margin-bottom: 4rem;
    }
    .contact-big a {
      color: var(--fg); text-decoration: none;
      border-bottom: 1px solid var(--border); padding-bottom: 1px;
      transition: color 0.2s, border-color 0.2s;
    }
    .contact-big a:hover { color: var(--amber); border-color: var(--amber); }

    .contact-socials { display: flex; gap: 2.5rem; flex-wrap: wrap; }
    .contact-socials a {
      font-size: 0.58rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--border); text-decoration: none; transition: color 0.2s;
    }
    .contact-socials a:hover { color: var(--amber); }

    footer {
      position: relative; z-index: 10;
      border-top: 1px solid var(--border);
      padding: 1.8rem 3rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    footer span { font-size: 0.52rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--border); }

    .blink { animation: blink 1.2s step-end infinite; color: var(--amber); }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }

    @media (max-width: 640px) {
      nav, #hero, #ventures, #contact { padding-left: 1.5rem; padding-right: 1.5rem; }
      .venture-item { grid-template-columns: 2rem 1fr; }
      .venture-role { display: none; }
      .hero-bottom { flex-direction: column; gap: 0.8rem; align-items: flex-start; }
      footer { padding: 1.5rem; flex-direction: column; gap: 0.5rem; text-align: center; }
    }
  </style>
</head>
<body>

  <div id="grain"></div>
  <div id="scanlines"></div>
  <div id="phosphor"></div>
  <div id="crt-vignette"></div>

  <nav id="nav">
    <a href="#hero" class="nav-logo">jereme.xyz</a>
    <span class="nav-right">upper left coast<span class="blink">_</span></span>
  </nav>

  <section id="hero">
    <div class="hero-main">
      <div class="hero-eyebrow">signal active · pnw</div>
      <h1 class="hero-name" id="hero-name"></h1>
      <p class="hero-tagline" id="hero-tagline">
        builder. founder.<br>
        always on.
      </p>
    </div>
  </section>

  <section id="contact">
    <div class="contact-label reveal-el">signal</div>
    <div class="contact-big contact-line reveal-el">
      reach me at<br>
      <a href="mailto:jer@jereme.xyz">jer@jereme.xyz</a>
    </div>
    <div class="contact-socials contact-line reveal-el">
      <a href="https://www.threads.com/@jeremedotxyz" target="_blank">threads</a>
      <a href="https://www.instagram.com/jeremedotxyz/" target="_blank">instagram</a>
      <a href="https://github.com/jeremedotxyz" target="_blank">github</a>
      <a href="latlong.html">lat/long</a>
    </div>
  </section>

  <footer>
    <span>jereme.xyz</span>
    <span>always on<span class="blink">_</span></span>
  </footer>

  <script>
    // Build the hero name letter by letter
    // Order: xyz first, then jereme, then dot last
    // Each group is rendered in DOM order (jereme . xyz) but animated by delay

    const nameEl = document.getElementById('hero-name');

    // Define the three groups with their start delays (seconds)
    // xyz lands first, jereme second, dot last
    const groups = [
      { chars: 'jereme', amber: false, startDelay: 0.9,  step: 0.07 },
      { chars: '.',      amber: true,  startDelay: 2.2,  step: 0,    isDot: true },
      { chars: 'xyz',    amber: true,  startDelay: 0.4,  step: 0.07 },
    ];

    groups.forEach(group => {
      [...group.chars].forEach((char, i) => {
        const span = document.createElement('span');
        span.className = 'letter' + (group.isDot ? ' letter-dot' : '') + (group.amber ? ' amber' : '');
        span.textContent = char;
        const delay = group.startDelay + (i * group.step);
        span.style.animationDelay = delay + 's';
        nameEl.appendChild(span);
      });
    });

    // Fade in tagline and bottom after all letters have landed
    // Last letter: dot at 2.2s, duration ~0.95s → done ~3.15s
    const tagline = document.getElementById('hero-tagline');
    tagline.style.animation = 'fadeUp 0.8s ease 3.4s forwards';

    // nav scroll
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 40);
    });

    // venture reveal
    const items = document.querySelectorAll('.venture-item');
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e, i) => {
        if (e.isIntersecting) {
          setTimeout(() => e.target.classList.add('visible'), i * 80);
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.1 });
    items.forEach(el => io.observe(el));

    // generic reveal
    const revealEls = document.querySelectorAll('.reveal-el, .contact-line');
    const ro = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          ro.unobserve(e.target);
        }
      });
    }, { threshold: 0.1 });
    revealEls.forEach(el => ro.observe(el));
  </script>

</body>
</html>
